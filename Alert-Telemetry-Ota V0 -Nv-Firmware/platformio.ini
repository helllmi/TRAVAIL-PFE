; ============================================================================
;  PlatformIO Project Configuration - ESP32-S3 + SIM7670G + MQTT + OTA
; ============================================================================

[env:esp32-s3-devkitc-1]

platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash + PSRAM (ESP32-S3R8 = QIO Flash, OPI PSRAM 8MB) ──────────────────
board_build.flash_mode           = qio
board_build.psram_type           = opi
board_build.arduino.memory_type  = qio_opi   ; LIGNE CRITIQUE

; ── Mémoire (16MB flash, partitions par défaut S3) ────────────────────────
board_upload.flash_size          = 16MB
board_upload.maximum_size        = 16777216
board_build.partitions           = default_16MB.csv
board_build.filesystem           = littlefs 
; NB: default_16MB.csv contient déjà 2 partitions OTA (app0, app1) de ~6MB
;     donc OTA fonctionnel sans modif. Si tu veux du custom, change ici.

; ── Build flags ────────────────────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -D FIRMWARE_VERSION=\"1.0.0\"
    -D CORE_DEBUG_LEVEL=3

; ── Serial ─────────────────────────────────────────────────────────────────
upload_speed                     = 921600
monitor_speed                    = 115200

; ── Bibliothèques ──────────────────────────────────────────────────────────
lib_deps =
    plerup/EspSoftwareSerial
    mikalhart/TinyGPSPlus
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    adafruit/Adafruit NeoPixel
